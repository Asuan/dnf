name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  build:
    name: ${{ matrix.platform }}
    needs: [ checks ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-x64
          - linux-arm
          - macos-arm
          - macos-x64
          - windows-x64

        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - platform: macos-arm
            os: macos-15
            target: aarch64-apple-darwin
          - platform: macos-x64
            os: macos-15
            target: x86_64-apple-darwin
          - platform: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ matrix.target }}
          toolchain: stable

      - name: Install cargo-llvm-cov
        if: ${{ matrix.platform == 'linux-x64' }}
        uses: taiki-e/install-action@main
        with:
          tool: cargo-llvm-cov

      - name: Test (all features)
        if: ${{ matrix.platform != 'linux-x64' }}
        env:
          CARGO_TERM_COLOR: always
          RUST_BACKTRACE: 1
        run: |
          cargo test --workspace --all-features

      - name: Test with coverage
        if: ${{ matrix.platform == 'linux-x64' }}
        env:
          CARGO_TERM_COLOR: always
          RUST_BACKTRACE: 1
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

  feature-combinations:
    name: Feature combinations
    needs: [ checks ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Test default features (derive)
        run: cargo test --workspace

      - name: Test no default features (builder only)
        run: cargo test --workspace --no-default-features

      - name: Test serde only
        run: cargo test --workspace --no-default-features --features serde

      - name: Test derive only
        run: cargo test --workspace --no-default-features --features derive

      - name: Test parser + derive
        run: cargo test --workspace --no-default-features --features "parser,derive"
